server_names = ['cs-swe', 'cs-milan', 'cs-ch', 'cs-austria', 'cs-czech']
# server_names = ['cloudflare']
# server_names = ['libredns-noads', 'cloudflare']
# server_names = ['bortzmeyer', 'libredns-noads', 'adguard-dns-doh', 'blahdns-de-doh' ]
# server_names = ['dnscry.pt-yerevan-ipv4', 'dnscry.pt-istanbul-ipv4', 'dnscry.pt-paris-ipv4', 'dct-de2']
# server_names = ['dns.digitalsize.net', 'adguard-dns-unfiltered', 'dns4eu', 'dnsbunker']

listen_addresses = ['127.0.0.1:53']
max_clients = 250
ipv4_servers = true
ipv6_servers = false
dnscrypt_servers = true
doh_servers = true
odoh_servers = false
require_dnssec = false
require_nolog = false
require_nofilter = false
disabled_server_names = []

force_tcp = true
http3 = false
http3_probe = false

timeout = 6000

keepalive = 60

# http_proxy = 'http://127.0.0.1:40443'
# proxy = "http://127.0.0.1:40443"

## 'wp2' (default): Weighted Power of Two - selects the better performing server
## from two random candidates based on real-time RTT and success rates.
## 'p2': Randomly choose 1 of the fastest 2 servers by latency.
## 'ph': Randomly choose from fastest half of servers.
## 'p<n>': Randomly choose from fastest n servers (e.g., 'p3' for fastest 3).
## 'first': Always use the fastest server.
## 'random': Randomly choose from all servers.
lb_strategy = 'wp2'

## Set to `true` to constantly try to estimate the latency of all the resolvers
lb_estimator = true

log_file = '/var/log/dnscrypt-proxy/dnscrypt-proxy.log'
use_syslog = true
log_files_max_size = 10
log_files_max_age = 7
log_files_max_backups = 1

cert_refresh_delay = 240

ignore_system_dns = true
bootstrap_resolvers = ['178.22.122.100:53']
netprobe_timeout = 60
netprobe_address = '9.9.9.9:53'

block_ipv6 = true
block_unqualified = true
block_undelegated = true
reject_ttl = 10

cache = true
cache_size = 4096
cache_min_ttl = 2400
cache_max_ttl = 86400
cache_neg_min_ttl = 60
cache_neg_max_ttl = 600

[query_log]
format = 'tsv'

[nx_log]
format = 'tsv'

[sources]
[sources.public-resolvers]
urls = [
  'https://raw.githubusercontent.com/DNSCrypt/dnscrypt-resolvers/master/v3/public-resolvers.md',
